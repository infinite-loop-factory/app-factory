appId: com.gracefullight.countrytracker
name: App Launch and Login Screen
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 3000

# Dev launcher (cold-start 후): localhost 서버 탭하여 JS 번들 로드
- runFlow:
    when:
      visible:
        text: "DEVELOPMENT SERVERS"
    commands:
      - tapOn:
          text: "http://localhost:8081"
      - runFlow:
          when:
            visible:
              text: "Open"
          commands:
            - tapOn: "Open"
      - waitForAnimationToEnd:
          timeout: 6000

# Continue / Dismiss dev modals
- runFlow:
    when:
      visible: { text: "Continue" }
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible: { text: "Dismiss" }
    commands:
      - tapOn: "Dismiss"
      - waitForAnimationToEnd:
          timeout: 1000

# Dev launcher menu (Reload/Go home)가 남으면 앱 재진입으로 회피
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 3000

- assertVisible: "Start Your Journey"
- assertVisible: "Sign in with Apple"
- assertVisible: "Login with Google"
- assertVisible: "Login with GitHub"
- assertVisible: "Terms of Service"
- assertVisible: "Privacy Policy"
