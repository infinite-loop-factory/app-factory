appId: com.gracefullight.countrytracker
name: Home Screen Navigation
tags:
  - requires-auth
---
- runFlow: ../setup/boot.yaml
- assertVisible: "My Travels"
- assertVisible: "Countries"
- assertVisible: "Days"

# Search input
- tapOn: "Search destination..."
- inputText: "Japan"
- assertVisible: "Japan"
- clearText

# Filter chips
- tapOn: "Most Days"
- waitForAnimationToEnd:
    timeout: 800
- tapOn: "Recent"
- waitForAnimationToEnd:
    timeout: 800

# FAB
- assertVisible:
    id: "home-add-fab"
