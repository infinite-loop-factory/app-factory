appId: com.gracefullight.countrytracker
name: Add Visit Form Open
tags:
  - requires-auth
---
- runFlow: ../setup/boot.yaml
- assertVisible: "My Travels"

- tapOn:
    id: "home-add-fab"
- waitForAnimationToEnd:
    timeout: 1500

- assertVisible: "Add a New Visit"
- assertVisible: "Select a country"

# Cancel back to home (skip submit to avoid sim location dependency)
- tapOn: "Cancel"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "My Travels"
