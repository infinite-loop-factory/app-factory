appId: com.gracefullight.countrytracker
name: Filter Countries
tags:
  - requires-auth
---
- runFlow: ../setup/boot.yaml
- assertVisible: "My Travels"

# Tap inline filter chip (visible in row above country list)
- tapOn: "Most Days"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn: "Asia"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn: "Recent"
- waitForAnimationToEnd:
    timeout: 1000

# Back to default — still on home
- assertVisible: "My Travels"
- assertVisible: "Countries"
