appId: com.gracefullight.countrytracker
name: Filter Countries
tags:
  - requires-auth
---
- launchApp
- assertVisible: "My Travels"

# Open filter bottom sheet
- tapOn:
    id: "home.filter-button-a11y"
- assertVisible: "Filter visited countries"
- assertVisible: "Sort"
- assertVisible: "Region"

# Select "Most Days" sort
- tapOn: "Most Days"

# Select region
- tapOn: "Asia"

# Apply filter
- tapOn: "Apply"

# Verify filter is applied (chip should be active)
# Open filter again and reset
- tapOn:
    id: "home.filter-button-a11y"
- tapOn: "Recent"
- tapOn: "Apply"
