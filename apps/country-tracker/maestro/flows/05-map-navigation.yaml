- runFlow: ../setup/boot.yaml
- assertVisible: "My Travels"

# Map tab 버튼이 노출되는지만 확인 (실제 진입은 별도 검증)
- assertVisible:
    id: "tab-map"
- assertVisible:
    id: "tab-home"
- assertVisible:
    id: "tab-settings"
