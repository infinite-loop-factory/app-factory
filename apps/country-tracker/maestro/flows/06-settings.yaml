appId: com.gracefullight.countrytracker
name: Settings Navigation
tags:
  - requires-auth
---
- runFlow: ../setup/boot.yaml
- assertVisible: "My Travels"

- tapOn:
    id: "tab-settings"
- waitForAnimationToEnd:
    timeout: 2000

- assertVisible: "Settings"

- scrollUntilVisible:
    element: "Preferences"
    direction: DOWN
    timeout: 5000

- back
- waitForAnimationToEnd:
    timeout: 1500
