appId: com.gracefullight.countrytracker
name: Android Widget Render
tags:
  - widget
  - android
---
# 위젯 렌더링 검증 (Android 전용)
# 사전 조건: 디바이스 홈스크린에 CountryWidget이 추가되어 있어야 함
# (위젯 추가는 OS 레벨 작업이라 자동화 불가 — 수동으로 추가 후 실행)
#
# 검증 흐름:
# 1. 앱 진입 → 위젯 동기화 호출
# 2. 홈스크린으로 빠지기 (위젯 표시 확인은 시각 검증으로만 가능, 텍스트 추출은 launcher process 권한 한계)
# 3. 앱 재진입 후 정상 동작 확인

- launchApp:
    clearState: false

# 앱 active 진입 시 useWidgetSync가 발동되어야 함
- waitForAnimationToEnd:
    timeout: 3000

# 백그라운드로 보내기 (위젯 OS 갱신 기회 부여)
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 2000

# 다시 앱으로 복귀 → AppState active 트리거로 위젯 재동기화
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 2000

# 정상 종료
- assertVisible: ".*"
