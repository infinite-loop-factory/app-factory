appId: com.gracefullight.countrytracker
name: Widget Render and App Lifecycle Sync
tags:
  - widget
  - lifecycle
---
# 위젯 렌더링 검증
# 사전 조건: 디바이스 홈스크린에 CountryWidget이 추가되어 있을 것
# (위젯 추가는 OS 레벨 작업이라 자동화 불가 — 수동으로 추가 후 실행)
#
# 검증 흐름:
# 1. 앱 진입 시 useWidgetSync 발동 (AppState 'active')
# 2. 백그라운드 진입 후 재진입 시 재동기화
# 3. 위젯 task handler가 등록되어 있어 OS 위젯 요청 처리 가능

- runFlow: ../setup/boot.yaml
- waitForAnimationToEnd:
    timeout: 3000

# 정상 진입 확인 (로그인 + 데이터 로딩 완료)
- assertVisible: "My Travels"

# 백그라운드 진입 → 위젯 OS 갱신 기회 부여
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 2000

# 앱 재진입 → AppState 'active' 트리거 → useWidgetSync 발동
- runFlow: ../setup/boot.yaml
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "My Travels"

# 한 번 더 백그라운드/포그라운드 사이클 (위젯 sync 호출 누수 없는지 확인)
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 1500
- runFlow: ../setup/boot.yaml
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "My Travels"
