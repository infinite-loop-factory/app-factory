appId: com.gracefullight.countrytracker
name: Widget Deep Link Entry
tags:
  - requires-auth
  - widget
  - deep-link
---
# country-tracker://home deep link 진입 검증

- runFlow: ../setup/boot.yaml
- assertVisible: "My Travels"

- pressKey: Home
- waitForAnimationToEnd:
    timeout: 1500

- openLink: country-tracker://home

- runFlow:
    when:
      visible: { text: "Open" }
    commands:
      - tapOn: "Open"
- waitForAnimationToEnd:
    timeout: 4000

- runFlow:
    when:
      visible: { text: "Continue" }
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 1500

- runFlow:
    when:
      visible: { text: "Dismiss" }
    commands:
      - tapOn: "Dismiss"
      - waitForAnimationToEnd:
          timeout: 1000

# 다시 launchApp으로 안전한 home 진입
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "My Travels"
