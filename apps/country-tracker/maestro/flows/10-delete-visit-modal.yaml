appId: com.gracefullight.countrytracker
name: Delete Visit Confirmation Modal
tags:
  - requires-auth
  - requires-data
  - ui-primitives
---
- runFlow: ../setup/boot.yaml
- assertVisible: "My Travels"

# Swipe Japan card left to reveal delete
- swipe:
    from:
      id: "country-card-JP"
    direction: LEFT
- waitForAnimationToEnd:
    timeout: 1500

- assertVisible: "Delete"

- tapOn: "Delete"
- waitForAnimationToEnd:
    timeout: 1500

- runFlow:
    when:
      visible: { text: "Cancel" }
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000

- assertVisible: "My Travels"
