appId: com.gracefullight.countrytracker
name: Delete Visit Confirmation Modal
tags:
  - requires-auth
  - requires-data
  - ui-primitives
  - draft
---
# ReanimatedSwipeableмқҳ native swipe gestureлҠ” maestroмқҳ лӢЁмҲң swipeмҷҖ нҳёнҷҳм„ұ
# мқҙмҠҲк°Җ мһҲм–ҙ ліё flowлҠ” м№ҙл“ң л…ём¶ң + нҷ”л©ҙ м•Ҳм •м„ұл§Ң smoke кІҖмҰқ.
# мӢӨм ң swipe вҶ’ Delete UI кІҖмҰқмқҖ лі„лҸ„ PR (gesture-handler bridge audit).

- runFlow: ../setup/boot.yaml
- assertVisible: "My Travels"

# Japan card л…ём¶ң (swipe targetк°Җ мЎҙмһ¬н•Ёмқ„ нҷ•мқё)
- assertVisible:
    id: "country-card-JP"

# м№ҙл“ң нғӯ вҶ’ detail мқҙлҸҷ (delete м§„мһ… лҢҖмІҙ кІҖмҰқ: м№ҙл“ң мқён„°лһҷм…ҳ к°ҖлҠҘм„ұ)
- tapOn:
    id: "country-card-JP"
- waitForAnimationToEnd:
    timeout: 2500

# Detail screenм—җм„ң trash м•„мқҙмҪҳмқҖ visit history row мҳҶм—җ мһҲмқҢ
- assertVisible: "Visit History"

# лӢӨмӢң home
- tapOn:
    id: "country-detail-back"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "My Travels"
