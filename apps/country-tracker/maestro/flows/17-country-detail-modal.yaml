appId: com.gracefullight.countrytracker
name: Country Detail Open
tags:
  - requires-auth
  - requires-data
  - ui-primitives
---
- runFlow: ../setup/boot.yaml
- assertVisible: "My Travels"

- tapOn:
    id: "country-card-JP"
- waitForAnimationToEnd:
    timeout: 2500

- assertVisible: "Japan"

- back
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "My Travels"
