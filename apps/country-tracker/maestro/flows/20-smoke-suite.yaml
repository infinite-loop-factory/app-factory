appId: com.gracefullight.countrytracker
name: Smoke Suite - Critical Paths
tags:
  - smoke
  - critical
---
# CI smoke. Map screen은 별도 이슈로 진입 회피.

- runFlow: ../setup/boot.yaml
- waitForAnimationToEnd:
    timeout: 2500

# 홈 화면
- assertVisible: "My Travels"
- assertVisible: "Countries"
- assertVisible: "Days"

# 검색
- tapOn: "Search destination..."
- inputText: "Korea"
- clearText
- back

# 필터 chip
- tapOn: "Most Days"
- waitForAnimationToEnd:
    timeout: 800
- tapOn: "Recent"

# Settings tab
- tapOn:
    id: "tab-settings"
- waitForAnimationToEnd:
    timeout: 2500
- assertVisible: "Settings"

# Home tab
- tapOn:
    id: "tab-home"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "My Travels"

# Lifecycle (위젯 sync 발동)
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 1500
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 2500
- assertVisible: "My Travels"
