appId: com.gracefullight.countrytracker
name: Smoke Suite - Critical Paths
tags:
  - smoke
  - critical
---
# 핵심 사용자 경로를 1개 플로우에 압축한 smoke 테스트
# CI에서 빠른 통과 여부 확인용

- launchApp
- waitForAnimationToEnd:
    timeout: 2500

# 1. 홈 화면 진입
- assertVisible: "My Travels"
- assertVisible: "Countries"
- assertVisible: "Days Tracked"

# 2. 검색 동작
- tapOn: "Search destination..."
- inputText: "Korea"
- clearText
- back

# 3. 필터
- tapOn:
    id: "home.filter-button-a11y"
- assertVisible: "Filter visited countries"
- tapOn: "Cancel"

# 4. Map 탭
- tapOn: "Map"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Countries"

# 5. Settings 탭
- tapOn: "Settings"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Preferences"
- assertVisible: "Visa Alerts"

# 6. 다시 홈
- tapOn: "Home"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "My Travels"

# 7. 라이프사이클 (위젯 sync 발동 포함)
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 1500
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "My Travels"
