appId: com.gracefullight.countrytracker
name: E2E Auth Setup
tags:
  - setup
env:
  MAESTRO_E2E_SUPABASE_URL: ${MAESTRO_E2E_SUPABASE_URL}
  MAESTRO_E2E_SUPABASE_ANON_KEY: ${MAESTRO_E2E_SUPABASE_ANON_KEY}
  MAESTRO_E2E_TEST_EMAIL: ${MAESTRO_E2E_TEST_EMAIL}
  MAESTRO_E2E_TEST_PASSWORD: ${MAESTRO_E2E_TEST_PASSWORD}
---
# 한 번 실행하여 Supabase 세션을 앱에 주입.
# 이후 모든 flows는 clearState: false 로 세션 재사용.
#
# 사전 조건:
#   - 앱이 EXPO_PUBLIC_E2E_MODE=true 로 빌드되어 있어야 함
#     (development/preview 빌드 한정; production 빌드는 __DEV__=false 로 차단)
#   - 위 env 변수가 maestro 실행 환경에 노출되어 있어야 함
#
# 실행 예:
#   maestro test -e MAESTRO_E2E_TEST_EMAIL=... -e MAESTRO_E2E_TEST_PASSWORD=... \
#     maestro/setup/00-seed-auth.yaml

# 1. Supabase REST API로 password grant → access/refresh 토큰 획득
- runScript:
    file: ../scripts/seed-session.js

# 2. 앱 colds-tart (이전 세션 클리어)
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 2000

# 3. 매직 deep link로 setSession 발동
- openLink: "country-tracker://e2e-auth?access_token=${output.ACCESS_TOKEN}&refresh_token=${output.REFRESH_TOKEN}"

# 4. 세션 적용 → 홈 진입 확인
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible: "My Travels"
