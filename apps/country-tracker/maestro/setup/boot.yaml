appId: com.gracefullight.countrytracker
---
# 인증 의존 flow의 공통 진입 시퀀스
# - 앱 실행 (세션 유지)
# - dev launcher / Continue / LogBox Dismiss 자동 처리

- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 3000

# Dev launcher (cold-start 후 표시): localhost 서버 탭하여 JS 번들 로드
- runFlow:
    when:
      visible:
        text: "DEVELOPMENT SERVERS"
    commands:
      - tapOn:
          text: "http://localhost:8081"
      - runFlow:
          when:
            visible:
              text: "Open"
          commands:
            - tapOn: "Open"
      - waitForAnimationToEnd:
          timeout: 6000

# Developer info modal: Continue
- runFlow:
    when:
      visible:
        text: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 1500

# LogBox dismiss
- runFlow:
    when:
      visible:
        text: "Dismiss"
    commands:
      - tapOn: "Dismiss"
      - waitForAnimationToEnd:
          timeout: 1000

# 인증되지 않은 상태면 → 다시 setup 필요. 여기선 단순히 로그인 화면이 보이는지 알림
- runFlow:
    when:
      visible:
        text: "Start Your Journey"
    commands:
      - assertVisible: "Start Your Journey"
