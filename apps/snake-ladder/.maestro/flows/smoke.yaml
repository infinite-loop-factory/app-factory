appId: com.infinite-loop-factory.snake-ladder
---
- launchApp:
    clearState: true
- runFlow: ../subflows/connect-metro.yaml
- runFlow: ../subflows/dismiss-onboarding.yaml
- runFlow: ../subflows/start-game.yaml
- runFlow: ../subflows/complete-setup.yaml
- assertVisible:
    id: game-roll-button
# Tap until the press registers — a single tap can land mid-animation.
- repeat:
    times: 6
    while:
      visible:
        id: game-roll-button
    commands:
      - tapOn:
          id: game-roll-button
      - extendedWaitUntil:
          notVisible:
            id: game-roll-button
          timeout: 3000
          optional: true
- extendedWaitUntil:
    notVisible:
      id: game-roll-button
    timeout: 15000