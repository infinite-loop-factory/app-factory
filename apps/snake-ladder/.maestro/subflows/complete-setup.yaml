appId: com.infinite-loop-factory.snake-ladder
---
# Place all 5 qubits on distinct valid cells (6–95)
- tapOn:
    id: qubit-config-0
- tapOn:
    id: board-cell-10
- extendedWaitUntil:
    visible:
      id: qubit-marker-cell-10
    timeout: 15000
- tapOn:
    id: qubit-config-1
- tapOn:
    id: board-cell-20
- tapOn:
    id: qubit-config-2
- tapOn:
    id: board-cell-30
- tapOn:
    id: qubit-config-3
- tapOn:
    id: board-cell-40
- tapOn:
    id: qubit-config-4
- tapOn:
    id: board-cell-50
# Wait for CPU setup + passing handoff back to human
- extendedWaitUntil:
    visible:
      id: setup-pass-turn
    timeout: 90000
# A single tap can land mid-layout while the setup bar swaps for the dice
# dock — keep tapping until the button actually consumes the press.
- repeat:
    times: 6
    while:
      visible:
        id: setup-pass-turn
    commands:
      - tapOn:
          id: setup-pass-turn
      - extendedWaitUntil:
          notVisible:
            id: setup-pass-turn
          timeout: 3000
          optional: true
- extendedWaitUntil:
    visible:
      id: game-roll-button
    timeout: 90000